<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha383-1BmE3kWBq78iYhFldvKuhfTAU6auU8tT93WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="css/media.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="container">
                <div class="company-logo">
                    <div class="logo"><img src="img/logo.png" alt="Marico"></div>
                    <div class="text-logo">Marico</div>
                </div>
                <div class="options">
                    <nav class="header-nav">
                        <ul>
                            <li><a href="">Use Cases</a></li>
                            <li><a href="">About</a></li>
                            <li><a href="">Pricing</a></li>
                            <li><a href="">Blog</a></li>
                        </ul>
                    </nav>
                </div>
                <div class="buttons-header">
                    <div class="button">
                        <a href="#">Login</a>
                    </div>
                    <div class="button reg">
                        <a href="#">Sign Up</a>
                    </div>
                </div>
            </div>
        </header>
        <section>
            <div class="container">
                <div class="main-titles">
                    <div class="text-White">
                        Own your audience.
                    </div>
                    <div class="text-rgb">
                        So you do not lose them
                    </div>
                </div>
            </div>
        </section>
        <section>
            <div class="container">
                <div class="btn-content">
                    <div class="button-block">
                        <div class="title">
                            Turn your audience into email and
                            text message subscribers.
                        </div>
                        <div class="buttons">
                            <div class="button-group">
                                <a href="#" class="button b1">Get started now</a>
                                <a href="#" class="button b2">View a demo</a>
                            </div>
                        </div>
                        <div class="online-dot">

                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
